; ملف إعدادات التصدير. يُقرأ تلقائيًا من GitHub Actions عبر
; --export-debug "Android"، ويمكن أيضًا فتحه وتعديله من محرر Godot عبر
; Project > Export. راجع docs/ARCHITECTURE.md لشرح كل خيار هنا.
;
; هذه المرحلة تُصدّر نسخة Debug فقط (لا تحتاج أي مفتاح توقيع Keystore
; خاص — يستخدم Godot مفتاح التصحيح الافتراضي المدمج تلقائيًا). حين تقترب
; اللعبة من إصدار حقيقي على متجر Google Play، تُضاف حزمة "Android Release"
; منفصلة موقّعة بمفتاح حقيقي تُدار بياناته عبر GitHub Secrets — وليس هنا.

